  <text class="small" x="105" y="965">AI는 5월 15일~21일 데이터만 보고 5월 22일의 판단을 생성합니다. 이후 숨겨둔 실제 5월 22일 주가와 대조해 예측 신뢰성을 보여줍니다.</text>
  <text class="tiny" x="105" y="990">OpenRouter는 중간 시연 이후 결정되므로, 현재 구조는 기존 LLM 추상화 또는 mock Strategist로도 동작하도록 설계합니다.</text>
